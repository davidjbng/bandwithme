version: 2
updates:
  # pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    versioning-strategy: "increase"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    # Minor and patch updates go directly, major gets a PR
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    # Maturity period: at least 1 day
    # Dependabot doesn't have a direct maturity setting, but we use taze for that

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    labels:
      - "dependencies"
      - "ci"
