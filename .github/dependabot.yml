version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    # Group all minor & patch updates into a single PR
    groups:
      minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Major updates get their own PRs
    # Labels & assignee for easy filtering
    labels:
      - "dependencies"
    # Wait at least 1 day after release before upgrading (maturity period)
    versioning-strategy: increase
    # Use pnpm
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    open-pull-requests-limit: 10
