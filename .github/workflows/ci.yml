name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EXPO_PUBLIC_CONVEX_URL: https://blissful-spaniel-445.eu-west-1.convex.cloud
  EXPO_PUBLIC_CONVEX_SITE_URL: https://blissful-spaniel-445.eu-west-1.convex.site

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy Convex backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -n "$CONVEX_DEPLOY_KEY" ]; then
            echo "Deploying Convex backend..."
            npx convex deploy
          else
            echo "⚠ CONVEX_DEPLOY_KEY not set — skipping deploy. E2E tests may fail."
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build static web export
        run: pnpm web:export

      - name: Serve static export
        run: npx serve dist --listen 8081 --no-clipboard --single &
        shell: bash

      - name: Wait for web server
        run: |
          echo "Waiting for web server on http://127.0.0.1:8081..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081 | grep -q 200; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Server did not become ready"
          exit 1

      - name: Run Playwright E2E tests
        run: pnpm e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
